name: "Assign YuriSilenok on Approval"

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write

jobs:
  assign-yuri:
    if: ${{ github.event.review.state == 'approved' }}
    runs-on: ubuntu-latest
    steps:
      - name: Add YuriSilenok as reviewer after approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit $PR_NUMBER --add-reviewer YuriSilenok --repo $REPO
          echo "✅ YuriSilenok назначен ревьюером после одобрения PR"
