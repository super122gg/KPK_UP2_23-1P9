name: Check Fork Synchronization

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-fork-sync:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check sync
        run: |
          git remote add upstream https://github.com/${{ github.repository }}.git
          git fetch upstream ${{ github.event.pull_request.base.ref }} --quiet

          MERGE_BASE=$(git merge-base HEAD upstream/${{ github.event.pull_request.base.ref }})
          UPSTREAM_HEAD=$(git rev-parse upstream/${{ github.event.pull_request.base.ref }})

          if [ "$MERGE_BASE" != "$UPSTREAM_HEAD" ]; then
            echo ${{ github.event.pull_request.number }} > pr_number.txt
          fi

      - name: Upload PR number
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr_number.txt
          if-no-files-found: ignore
